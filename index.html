<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DevBot AI</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="chat-container">

<div class="chat-header">
DevBot AI
<p class="subtitle">Ask coding questions from the question bank below</p>
</div>


<div class="info">
⚠ DevBot only answers questions from the predefined question bank.
</div>


<div id="chat-box" class="chat-box"></div>


<div class="input-area">

<input
id="user-input"
placeholder="Ask question exactly as shown below..."
autocomplete="off"
/>

<button onclick="sendMessage()">Send</button>

</div>


<div class="question-bank">

<h3>Question Bank</h3>

<div class="buttons">

<button onclick="quickAsk('what is html')">What is HTML</button>

<button onclick="quickAsk('html tags list')">HTML tags list</button>

<button onclick="quickAsk('what is css')">What is CSS</button>

<button onclick="quickAsk('center div css')">Center div CSS</button>

<button onclick="quickAsk('what is javascript')">What is JavaScript</button>

<button onclick="quickAsk('js for loop')">JS for loop</button>

<button onclick="quickAsk('let vs const vs var')">let vs const vs var</button>

<button onclick="quickAsk('what is dom')">What is DOM</button>

<button onclick="quickAsk('python for loop')">Python for loop</button>

<button onclick="quickAsk('python function')">Python function</button>

<button onclick="quickAsk('python list')">Python list</button>

<button onclick="quickAsk('python dictionary')">Python dictionary</button>

<button onclick="quickAsk('what is git')">What is Git</button>

<button onclick="quickAsk('git push')">Git push</button>

<button onclick="quickAsk('git pull')">Git pull</button>

<button onclick="quickAsk('what is api')">What is API</button>

<button onclick="quickAsk('what is json')">What is JSON</button>

<button onclick="quickAsk('frontend vs backend')">Frontend vs Backend</button>

<button onclick="quickAsk('what is database')">What is database</button>

<button onclick="quickAsk('what is algorithm')">What is algorithm</button>

<button onclick="quickAsk('what is debugging')">What is debugging</button>

</div>

</div>


</div>

<script src="script.js"></script>

</body>

</html>
