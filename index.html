<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevBot AI | Coding Assistant</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="brand">
            <span class="icon">💻</span>
            <div>
                <strong>DevBot AI</strong>
                <small>Coding Expert</small>
            </div>
        </div>
    </div>
    <div id="chat-box" class="chat-box">
        <div class="message bot">
Hello 👋 I can help with debugging, coding, and explanations.
Ask me anything!
        </div>
    </div>
    <div class="chat-input-area">
        <textarea id="user-input" placeholder="Ask coding question..." rows="1"></textarea>
        <button id="send-btn">Run</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
